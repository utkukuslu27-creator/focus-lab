<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusLab 🧪 | Dijital Çalışma Üssü</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --fire-color: #f97316;
            --danger-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .logo span {
            color: var(--accent-color);
        }

        .streak-badge {
            background-color: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.3);
            color: var(--fire-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        main {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* İSTATİSTİK KARTLARI */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px 20px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        /* POMODORO KARTI */
        .timer-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 35px 30px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .mode-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .timer-display {
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-start {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-start:hover {
            background-color: var(--accent-hover);
        }

        .btn-reset {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        .btn-reset:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* GÖREV LİSTESİ KARTI */
        .todo-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .todo-card h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .todo-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .todo-input {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
        }

        .todo-input:focus {
            border-color: var(--accent-color);
        }

        .btn-add {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-add:hover {
            background-color: var(--accent-hover);
        }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .todo-item.completed span {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .todo-left {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .todo-checkbox {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px 8px;
            border-radius: 4px;
            transition: color 0.2s;
        }

        .btn-delete:hover {
            color: var(--danger-color);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 15px 0;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🧪 Focus<span>Lab</span></div>
        <div class="streak-badge">🔥 1 Günlük Seri</div>
    </header>

    <main>
        <!-- İSTATİSTİK PANANELİ -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Tamamlanan Pomodoro</h3>
                <div class="value" id="pomo-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Toplam Odak Süresi</h3>
                <div class="value" id="total-time">0 dk</div>
            </div>
        </div>

        <!-- POMODORO SAYAÇ ALANI -->
        <div class="timer-card">
            <div class="mode-buttons">
                <button class="mode-btn active" id="mode-work" onclick="setMode('work')">🎯 Odaklanma (40dk)</button>
                <button class="mode-btn" id="mode-break" onclick="setMode('break')">☕ Mola (10dk)</button>
            </div>

            <div class="timer-display" id="timer">40:00</div>

            <div class="controls">
                <button class="btn btn-start" id="start-btn" onclick="toggleTimer()">Başlat</button>
                <button class="btn btn-reset" onclick="resetTimer()">Sıfırla</button>
            </div>
        </div>

        <!-- GÖREV LİSTESİ ALANI -->
        <div class="todo-card">
            <h2>📋 Bugünkü Görevler</h2>
            <div class="todo-input-group">
                <input type="text" id="todo-input" class="todo-input" placeholder="Yeni bir görev yazın ve Enter'a basın..." onkeypress="handleKeyPress(event)">
                <button class="btn-add" onclick="addTodo()">Ekle</button>
            </div>
            <ul id="todo-list" class="todo-list">
                <!-- Görevler JS ile buraya eklenecek -->
            </ul>
        </div>
    </main>

    <script>
        /* --- İSTATİSTİK MANTIĞI --- */
        let completedPomos = parseInt(localStorage.getItem('focuslab_pomos')) || 0;
        
        function updateStatsDisplay() {
            document.getElementById('pomo-count').textContent = completedPomos;
            const totalMinutes = completedPomos * 40;
            document.getElementById('total-time').textContent = `${totalMinutes} dk`;
        }

        /* --- SAYAÇ VE BİDİRİM SESİ MANTIĞI --- */
        let timeLeft = 40 * 60; 
        let timerId = null;
        let isWorkMode = true;

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('start-btn');
        const workBtn = document.getElementById('mode-work');
        const breakBtn = document.getElementById('mode-break');

        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.8);
            } catch(e) {
                console.log("Ses çalınamadı");
            }
        }

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            timerDisplay.textContent = formattedTime;
            document.title = `${formattedTime} - FocusLab 🧪`;
        }

        function toggleTimer() {
            if (timerId === null) {
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timerId);
                        timerId = null;
                        playBeep();

                        if (isWorkMode) {
                            completedPomos++;
                            localStorage.setItem('focuslab_pomos', completedPomos);
                            updateStatsDisplay();
                            alert("40 dakikalık odaklanma bitti! Tebrikler, +1 Pomodoro kazandın! 🎉");
                        } else {
                            alert("10 dakikalık mola bitti! Çalışmaya dönme vakti. 💪");
                        }

                        startBtn.textContent = "Başlat";
                        startBtn.style.backgroundColor = "var(--accent-color)";
                    }
                }, 1000);
                startBtn.textContent = "Durdur";
                startBtn.style.backgroundColor = "var(--danger-color)";
            } else {
                clearInterval(timerId);
                timerId = null;
                startBtn.textContent = "Devam Et";
                startBtn.style.backgroundColor = "var(--accent-color)";
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = isWorkMode ? 40 * 60 : 10 * 60;
            startBtn.textContent = "Başlat";
            startBtn.style.backgroundColor = "var(--accent-color)";
            updateDisplay();
        }

        function setMode(mode) {
            if (mode === 'work') {
                isWorkMode = true;
                timeLeft = 40 * 60;
                workBtn.classList.add('active');
                breakBtn.classList.remove('active');
            } else {
                isWorkMode = false;
                timeLeft = 10 * 60;
                breakBtn.classList.add('active');
                workBtn.classList.remove('active');
            }
            resetTimer();
        }

        /* --- GÖREV LİSTESİ MANTIĞI --- */
        let todos = JSON.parse(localStorage.getItem('focuslab_todos')) || [];

        function saveTodos() {
            localStorage.setItem('focuslab_todos', JSON.stringify(todos));
        }

        function renderTodos() {
            const todoList = document.getElementById('todo-list');
            todoList.innerHTML = '';

            if (todos.length === 0) {
                todoList.innerHTML = '<div class="empty-state">Henüz eklenmiş bir görev yok. Yukarıdan ekleyebilirsin! ✨</div>';
                return;
            }

            todos.forEach((todo, index) => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <div class="todo-left" onclick="toggleTodo(${index})">
                        <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''}>
                        <span>${todo.text}</span>
                    </div>
                    <button class="btn-delete" onclick="deleteTodo(${index})">🗑️</button>
                `;
                todoList.appendChild(li);
            });
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();

            if (text !== '') {
                todos.push({ text: text, completed: false });
                input.value = '';
                saveTodos();
                renderTodos();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addTodo();
            }
        }

        function toggleTodo(index) {
            todos[index].completed = !todos[index].completed;
            saveTodos();
            renderTodos();
        }

        function deleteTodo(index) {
            todos.splice(index, 1);
            saveTodos();
            renderTodos();
        }

        renderTodos();
        updateStatsDisplay();
    </script>
</body>
</html>
