<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusLab 🧪 | Dijital Çalışma Üssü</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS TASARIM VE DARK MODE KODLARI */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --fire-color: #f97316;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* HEADER / ÜST BAR */
        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: var(--accent-color);
        }

        .streak-badge {
            background-color: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.3);
            color: var(--fire-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* MAIN CONTAINER */
        main {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .welcome-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }

        .welcome-card h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .welcome-card p {
            color: var(--text-muted);
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <!-- ÜST BAR: LOGO VE STREAK -->
    <header>
        <div class="logo">
            🧪 Focus<span>Lab</span>
        </div>
        <div class="streak-badge">
            🔥 1 Günlük Seri
        </div>
    </header>

    <!-- ANA İÇERİK ALANI -->
    <main>
        <div class="welcome-card">
            <h1>Hoş Geldin! 👋</h1>
            <p>Bugünkü hedeflerine ulaşmak için odaklanmaya başla.</p>
        </div>
    </main>

</body>
</html>
