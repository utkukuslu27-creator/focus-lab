<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetFocusLab</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-secondary);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* İstatistikler */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .stat-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-box h3 {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .stat-box span {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--success);
        }

        /* Sayaç Bölümü */
        .timer-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--text-color);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button.secondary {
            background-color: #475569;
        }
        button.secondary:hover {
            background-color: #334155;
        }

        /* Görevler Bölümü */
        .task-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.75rem;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .task-lists {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 600px) {
            .task-lists {
                grid-template-columns: 1fr;
            }
        }

        .task-column h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 250px;
            overflow-y: auto;
        }

        li {
            background: rgba(15, 23, 42, 0.4);
            padding: 0.75rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border);
        }

        li.completed span {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .delete-btn {
            background: transparent;
            color: #ef4444;
            padding: 0.2rem 0.5rem;
            font-size: 0.9rem;
        }
        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>GetFocusLab</h1>
            <p>Disiplin ve Odak Takip Sistemi</p>
        </header>

        <!-- İstatistikler -->
        <div class="card stats-grid">
            <div class="stat-box">
                <h3>7 Günlük Performans</h3>
                <span id="perfCount">0</span>
            </div>
            <div class="stat-box">
                <h3>Toplam Odak Süresi</h3>
                <span id="focusTime">0 dk</span>
            </div>
        </div>

        <!-- 40 Dakikalık Odak Sayacı -->
        <div class="card timer-section">
            <h2>40 Dakikalık Odak Oturumu</h2>
            <div class="timer-display" id="timer">40:00</div>
            <div class="btn-group">
                <button id="startTimerBtn">Başlat</button>
                <button id="resetTimerBtn" class="secondary">Sıfırla</button>
            </div>
        </div>

        <!-- Görev Yönetimi -->
        <div class="card">
            <div class="task-input-group">
                <input type="text" id="taskInput" placeholder="Yeni bir görev ekle...">
                <button id="addTaskBtn">Ekle</button>
            </div>

            <div class="task-lists">
                <div class="task-column">
                    <h3>Aktif Görevler</h3>
                    <ul id="activeTasksList"></ul>
                </div>
                <div class="task-column">
                    <h3>Tamamlanan Görevler</h3>
                    <ul id="completedTasksList"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- VERİ YÖNETİMİ ---
        let state = JSON.parse(localStorage.getItem('focusLabState')) || {
            performanceCount: 0,
            totalFocusMinutes: 0,
            tasks: []
        };

        function saveState() {
            localStorage.setItem('focusLabState', JSON.stringify(state));
        }

        function updateUI() {
            document.getElementById('perfCount').textContent = state.performanceCount;
            document.getElementById('focusTime').textContent = state.totalFocusMinutes + ' dk';

            const activeList = document.getElementById('activeTasksList');
            const completedList = document.getElementById('completedTasksList');
            
            activeList.innerHTML = '';
            completedList.innerHTML = '';

            state.tasks.forEach((task, index) => {
                const li = document.createElement('li');
                if (task.completed) li.classList.add('completed');

                li.innerHTML = `
                    <div class="task-left">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onclick="toggleTask(${index})">
                        <span>${task.text}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${index})">Sil</button>
                `;

                if (task.completed) {
                    completedList.appendChild(li);
                } else {
                    activeList.appendChild(li);
                }
            });
        }

        // --- GÖREV FONKSİYONLARI ---
        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if(!text) return;

            state.tasks.push({ text: text, completed: false });
            input.value = '';
            saveState();
            updateUI();
        }

        function toggleTask(index) {
            state.tasks[index].completed = !state.tasks[index].completed;
            saveState();
            updateUI();
        }

        function deleteTask(index) {
            state.tasks.splice(index, 1);
            saveState();
            updateUI();
        }

        document.getElementById('addTaskBtn').addEventListener('click', addTask);
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') addTask();
        });

        // --- 40 DAKİKALIK SAYAÇ MANTIĞI ---
        const FOCUS_TIME_SECONDS = 40 * 60; // 40 dakika
        // Test etmek istersen süreyi küçültebilirsin, şimdilik gerçek 40 dakika (2400 saniye):
        let timeLeft = FOCUS_TIME_SECONDS;
        let timerInterval = null;
        let isRunning = false;

        const timerDisplay = document.getElementById('timer');
        const startTimerBtn = document.getElementById('startTimerBtn');
        const resetTimerBtn = document.getElementById('resetTimerBtn');

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            timerDisplay.textContent = formatTime(timeLeft);
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            startTimerBtn.textContent = 'Duraklat';
            startTimerBtn.classList.add('secondary');

            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerInterval);
                    isRunning = false;
                    startTimerBtn.textContent = 'Başlat';
                    startTimerBtn.classList.remove('secondary');
                    
                    // İSTEDİĞİN ÖZELLİK: 40 dk bitince performans ve odak süresi artar, görevlere dokunulmaz!
                    state.performanceCount += 1;
                    state.totalFocusMinutes += 40;
                    saveState();
                    updateUI();

                    alert('Tebrikler! 40 dakikalık odak oturumu tamamlandı. Performansın ve odak süren güncellendi.');
                    timeLeft = FOCUS_TIME_SECONDS;
                    updateTimerDisplay();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startTimerBtn.textContent = 'Devam Et';
            startTimerBtn.classList.remove('secondary');
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            timeLeft = FOCUS_TIME_SECONDS;
            updateTimerDisplay();
            startTimerBtn.textContent = 'Başlat';
            startTimerBtn.classList.remove('secondary');
        }

        startTimerBtn.addEventListener('click', () => {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        });

        resetTimerBtn.addEventListener('click', resetTimer);

        // Sayfa açıldığında arayüzü yükle
        updateUI();
        updateTimerDisplay();
    </script>
</body>
</html>
